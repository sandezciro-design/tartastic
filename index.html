<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tartastic Yani</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff8ee;
}

/* ===== FONDO ANIMADO ===== */

.fondo-animado{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:-1;
}

.cosita{
  position:absolute;
  font-size:30px;
  animation: mover 12s linear infinite;
}

@keyframes mover{
  0%{transform: translateX(0) rotate(0deg); opacity:1;}
  100%{transform: translateX(110vw) rotate(360deg); opacity:0;}
}

/* ===== MENU ===== */

nav{
  background:#f4e3c3;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
}

nav button{
  margin:5px;
  padding:10px 20px;
  border:none;
  background:#d9b382;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

nav button:hover{
  background:#c89c63;
}

/* ===== SECCIONES ===== */

.seccion{
  display:none;
  padding:40px;
  text-align:center;
}

.activa{
  display:block;
}

/* ===== TARJETAS ===== */

.producto{
  background:white;
  padding:15px;
  border-radius:15px;
  width:220px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ===== BOTON PEDIR ===== */

.pedir{
  margin-top:10px;
  padding:8px 12px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

/* ===== GRID PRODUCTOS ===== */

.grid-productos{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:20px;
  justify-items:center;
  max-width:1200px;
  margin:auto;
}
</style>
</head>

<body>

<!-- ===== FONDO ANIMADO ===== -->
<div class="fondo-animado">
  <div class="cosita" style="top:10%; left:-60px; animation-delay:0s;">🍰</div>
  <div class="cosita" style="top:25%; left:-60px; animation-delay:2s;">🧁</div>
  <div class="cosita" style="top:45%; left:-60px; animation-delay:4s;">🍓</div>
  <div class="cosita" style="top:65%; left:-60px; animation-delay:6s;">🥧</div>
  <div class="cosita" style="top:85%; left:-60px; animation-delay:8s;">🍩</div>
</div>

<!-- ===== MENU ===== -->
<nav>
  <button onclick="mostrar('inicio')">Inicio</button>
  <button onclick="mostrar('productos')">Productos</button>
  <button onclick="mostrar('sobre')">Sobre</button>
  <button onclick="mostrar('pedido')">Pedido</button>
</nav>

<!-- ===== INICIO ===== -->
<div id="inicio" class="seccion activa">

  <h1 style="font-size:50px;">🍰 Tartastic Yani</h1>
  <p>Tortas caseras en Rosario 💖</p>

  <hr style="margin:30px 0;">

  <h2>Nuestras Tortas</h2>

  <div id="inicioProductos"></div>

</div>

<!-- ===== PRODUCTOS ===== -->
<div id="productos" class="seccion">
  <h2>Catálogo Completo</h2>
  <div id="listaProductos" class="grid-productos"></div>
</div>

<!-- ===== SOBRE ===== -->
<div id="sobre" class="seccion">
  <h2>Sobre Nosotros</h2>
  <p>
    Pastelería casera en Rosario 🍓<br>
    Todo hecho a mano con ingredientes frescos 💕
  </p>
</div>

<!-- ===== PEDIDO ===== -->
<div id="pedido" class="seccion">
  <h2>Hacer un pedido</h2>
  <p>Elegí una torta y presioná "Pedir" 🍰</p>
</div>

<script>

/* 🔥🔥🔥 SOLO EDITÁ ESTA LISTA 🔥🔥🔥 */

const productos = [

  {
    nombre: "Torta de Chocolate",
    descripcion: "Bizcochuelo húmedo con dulce de leche",
    precio: "$8500"
  },

  {
    nombre: "Tarta de Frutilla",
    descripcion: "Crema pastelera con frutillas frescas",
    precio: "$7200"
  },

  {
    nombre: "Cheesecake",
    descripcion: "Suave y cremoso con base de galleta",
    precio: "$9000"
  },

  {
    nombre: "Torta Oreo",
    descripcion: "Chocolate con crema Oreo",
    precio: "$9200"
  },

  {
    nombre: "Lemon Pie",
    descripcion: "Ácido y dulce perfecto",
    precio: "$7800"
  }

];

/* 🔥 NO TOCAR ABAJO 🔥 */

function mostrar(id){
  document.querySelectorAll('.seccion')
    .forEach(sec => sec.classList.remove('activa'));

  document.getElementById(id)
    .classList.add('activa');
}

const lista = document.getElementById("listaProductos");
const listaInicio = document.getElementById("inicioProductos");

productos.forEach(p => {

  const tarjeta = `
    <div class="producto">
      <h3>${p.nombre}</h3>
      <p>${p.descripcion}</p>
      <b>${p.precio}</b><br>
      <button class="pedir"
        onclick="pedir('${p.nombre}')">
        Pedir
      </button>
    </div>
  `;

  lista.innerHTML += tarjeta;
  listaInicio.innerHTML += tarjeta;

});

function pedir(producto){
  window.open(
    "https://wa.me/5493411234567?text=Hola,%20quiero%20pedir%20" + producto,
    "_blank"
  );
}

</script>

</body>
</html>
